<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<title></title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #2563EB, #16A34A);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

.container {
background: white;
padding: 40px;
border-radius: 15px;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
text-align: center;
width: 320px;
}

.logo {
width: 120px;
margin-bottom: 15px;
}

h1 {
color: #2563EB;
margin: 5px 0;
}

p {
font-size: 14px;
color: #6B7280;
}

input {
width: 100%;
padding: 12px;
margin-top: 15px;
border-radius: 8px;
border: 1px solid #ccc;
}

button {
width: 100%;
padding: 12px;
margin-top: 15px;
background: #2563EB;
color: white;
border: none;
border-radius: 8px;
cursor: pointer;
font-size: 16px;
transition: 0.3s;
}

input, button {
box-sizing: border-box;
}


button:hover {
background: #1E40AF;
transform: scale(1.03);
}


.footer {
margin-top: 15px;
font-size: 12px;
color: #9CA3AF;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1 style="
text-align: center;
font-size: 21px;
font-weight: bold;
color: #2563EB;
letter-spacing: 2px;
text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
margin-bottom: 10px;
">
JOVISA TRÊS LAGOAS/MS
</h1>

<h2 style="
text-align: center;
font-size: 14px;
color: #6B7280;
letter-spacing: 1px;
margin-top: 0;
">
Controle e Cadastro de Presenças
</h2>

<p>Acesso restrito</p>

<input type="password" id="senha" placeholder="Digite a senha" onkeypress="if(event.key==='Enter') verificar()">


<button onclick="verificar()">Entrar</button>

<div class="footer">
Uso interno • Não compartilhar
</div>

</div>

<script>
function verificar() {
  var senha = document.getElementById("senha").value;

  if (senha === "1234") {
    window.location.href = "https://jovisa-jam-stats.lovable.app";
  } else {
    alert("Senha incorreta!");
  }
}
</script>

</body>
</html>
