<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>PRESENÇAS JOVISA TRÊS LAGOAS/MS</title>

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #2563EB, #16A34A);
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

.container {
background: white;
padding: 40px;
border-radius: 15px;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
text-align: center;
width: 320px;
}

h1 {
color: #2563EB;
margin-bottom: 5px;
}

h2 {
color: #111827;
margin-top: 0;
}

input {
width: 100%;
padding: 12px;
margin-top: 15px;
border-radius: 8px;
border: 1px solid #ccc;
}

button {
width: 100%;
padding: 12px;
margin-top: 15px;
background: #2563EB;
color: white;
border: none;
border-radius: 8px;
cursor: pointer;
font-size: 16px;
}

button:hover {
background: #1E40AF;
}

.footer {
margin-top: 15px;
font-size: 12px;
color: #9CA3AF;
}
</style>
</head>

<body>

<div class="container">
<img src="logo.png" width="120">
  
<h1 style="white-space: nowrap;">JOVISA TRÊS LAGOAS/MS</h1>
  
<h2>Lista de Presenças</h2>

<p>Acesso restrito</p>

<input type="password" id="senha" placeholder="Digite a senha">

<button onclick="verificar()">Entrar</button>

<div class="footer">
Uso interno • Não compartilhar
</div>

</div>

<script>
function verificar() {
  var senha = document.getElementById("senha").value;

  if (senha === "1234") {
    window.location.href = "https://jovisa-jam-stats.lovable.app/";
  } else {
    alert("Senha incorreta!");
  }
}
</script>

</body>
</html>
